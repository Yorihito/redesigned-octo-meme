name: MarqueeApp
options:
  bundleIdPrefix: com.ytada
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

targets:
  MarqueeApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MarqueeApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ytada.MarqueeApp
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
    info:
      path: MarqueeApp/Info.plist
      properties:
        CFBundleDisplayName: MarqueeApp
        NSMotionUsageDescription: "モーション連動表示のため、デバイスのモーションデータを使用します。"
        UILaunchScreen:
          UIColorName: ""
        UIRequiredDeviceCapabilities:
          - gyroscope
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
